[tool.uv.workspace]
members = [
  "packages/rbtr",
  "packages/rbtr-eval",
]

# -- ruff --

[tool.ruff]
target-version = "py313"
line-length = 100
src = [
  "packages/rbtr/src",
  "packages/rbtr-eval/src",
]
# Language sample fixtures are illustrative, not product code — exempt
# from linting and formatting (see [tool.mypy] exclude for rationale).
extend-exclude = ["packages/rbtr/src/rbtr/tests/languages/samples"]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = [
  "A",
  "ASYNC",
  "B",
  "BLE",
  "C4",
  "DTZ",
  "E",
  "F",
  "G",
  "I",
  "INT",
  "ISC",
  "LOG",
  "PT",
  "RUF",
  "S",
  "SIM",
  "TRY",
  "UP",
  "W",
]
ignore = ["E501", "W191"]
unfixable = ["B"]

[tool.ruff.lint.extend-per-file-ignores]
"**/tests/**/*.py" = [
  "S101", # asserts allowed in tests
]

[tool.ruff.lint.flake8-quotes]
docstring-quotes = "double"

[tool.ruff.lint.isort]
known-first-party = ["rbtr"]
combine-as-imports = true

[tool.ruff.lint.mccabe]
max-complexity = 12

# -- rumdl --

[tool.rumdl]
respect_gitignore = true
exclude = ["cov-append.md", "TODO-*", "packages/rbtr/src/rbtr/tests/languages/samples"]
extend-enable = ["MD060"]

[tool.rumdl.MD013]
line_length = 88
headings = false
code_blocks = false
tables = false
reflow = true

[tool.rumdl.MD060]
style = "aligned"

# -- sqlfluff --

[tool.sqlfluff.core]
dialect = "duckdb"
templater = "placeholder"
sql_file_exts = ".sql"

[tool.sqlfluff.indentation]
indent_unit = "space"
tab_space_size = 2

[tool.sqlfluff.templater.placeholder]
param_style = "dollar"

# -- mypy --

[tool.mypy]
python_version = "3.13"
packages = ["rbtr", "rbtr_eval"]
# Language sample fixtures are illustrative source for extraction tests,
# not product modules. They are validated by their own parse-clean and
# snapshot tests, so they are exempt from type-checking (and likewise
# from ruff, rumdl, vulture, and sqlfluff below).
exclude = ["tests/languages/samples/"]
disallow_incomplete_defs = true
disallow_untyped_calls = true
disallow_untyped_defs = true
follow_imports = "normal"
show_error_codes = true
warn_redundant_casts = true
warn_unused_configs = true



# -- Pytest & Coverage --

[tool.pytest.ini_options]
testpaths = [
  "packages/rbtr/src/rbtr/tests",
  "packages/rbtr-eval/src/rbtr_eval/tests",
]
minversion = "6.0"
addopts = ["--strict-markers", "--import-mode=importlib", "-n", "auto"]
filterwarnings = ["error::pytest.PytestUnhandledThreadExceptionWarning"]

[tool.pytest_env]
RBTR_DATA_DIR = {value = "/tmp/rbtr-test-data", transform = true}
RBTR_CONFIG_DIR = {value = "/tmp/rbtr-test-config", transform = true}
RBTR_LOG_DIR = {value = "/tmp/rbtr-test-logs", transform = true}
RBTR_DB_NAME = "test_index.duckdb"
RBTR_WARMUP = "false"
# Tests run the tiny CPU embedding model (all-MiniLM-L6-v2, 384-dim,
# ~20 MB) instead of the 600 MB production model.  In-process tests
# use StubModel (instant); only the subprocess CLI smoke tests load
# the real GGUF.  Reranker disabled — irrelevant to routing tests.
RBTR_EMBEDDING_MODEL = "second-state/All-MiniLM-L6-v2-Embedding-GGUF/all-MiniLM-L6-v2-Q4_0.gguf"
RBTR_EMBEDDING_POOLING_TYPE = "1"
RBTR_RERANKER_MODEL = ""

[tool.coverage.run]
branch = true
source = ["rbtr", "rbtr_eval"]

[tool.coverage.report]
show_missing = true

# -- Versioning --

[tool.bumpversion]
current_version = "2026.6.1"
parse = """(?x)                     # Verbose mode
    (?P<release>                    # The release part
        (?:[1-9][0-9]{3})\\.        # YYYY.
        (?:1[0-2]|[1-9])            # MM.
    )
    \\.(?P<num>0|[1-9]\\d*)         # num version number
    (?:
         -(?P<pre_label>dev|stable)     # pre_release label
        (?P<pre_release>0|[1-9]\\d*)    # pre_release version number
    )?
"""
serialize = ["{release}.{num}-{pre_label}{pre_release}", "{release}.{num}"]
search = "{current_version}"
replace = "{new_version}"

[tool.bumpversion.parts.release]
calver_format = "{YYYY}.{MM}"

[tool.bumpversion.parts.num]
independent = false

[tool.bumpversion.parts.pre_label]
optional_value = "stable"
values = ["dev", "stable"]

[[tool.bumpversion.files]]
glob = "packages/*/pyproject.toml"

[[tool.bumpversion.files]]
glob = "packages/*/package.json"
search = '"version": "{current_version}"'
replace = '"version": "{new_version}"'

[[tool.bumpversion.files]]
glob = "skills/*/package.json"
search = '"version": "{current_version}"'
replace = '"version": "{new_version}"'

[tool.vulture]
min_confidence = 80
paths = ["packages/rbtr/src/rbtr", "packages/rbtr-eval/src/rbtr_eval"]
# Language sample fixtures are illustrative, not product code.
exclude = ["*/tests/languages/samples/*"]
ignore_names = [
  "init_settings",        # pydantic_settings settings_customise_sources
  "dotenv_settings",      # pydantic_settings settings_customise_sources
  "file_secret_settings", # pydantic_settings settings_customise_sources
  "exc_type",             # __exit__ signature
  "exc_val",              # __exit__ signature
  "exc_tb",               # __exit__ signature
  "user_data",            # llama_cpp log callback signature
  "format",               # http.server log_message signature
]

[dependency-groups]
debug = [
    "vulture>=2.16",
]
dev = [
    "mypy>=2.1.0",
    "pytest-cov>=6.2",
    "pytest-env>=1.6.0",
    "ruff>=0.15.13",
    "rumdl>=0.1.93",
    "rust-just>=1.51.0",
    "sqlfluff>=4.2.1",
]
