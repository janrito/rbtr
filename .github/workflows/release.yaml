name: Release

on:
  # Pre-release: a push to a pre-release-* branch — a test build, not merged.
  push:
    branches: ["pre-release-*"]
  # Stable: the merge of a release-* PR — tagged on the merge commit on main.
  pull_request:
    types: [closed]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: >-
      github.event_name == 'push'
      || (github.event.pull_request.merged == true
          && startsWith(github.event.pull_request.head.ref, 'release-'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Stable cuts tag the PR merge commit on main; pre-releases build
          # from the pushed branch tip. Full history + tags so stable notes
          # can anchor to the previous stable tag.
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 0

      - uses: extractions/setup-just@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --frozen

      - uses: oven-sh/setup-bun@v2

      - name: Install node deps
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: version
        run: |
          VERSION=$(just --evaluate current_version)
          IS_DEV=$(just --evaluate is_dev)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_DEV=$IS_DEV" >> $GITHUB_OUTPUT

      - name: Check event matches version
        env:
          IS_DEV: ${{ steps.version.outputs.IS_DEV }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "$IS_DEV" != "true" ]; then
            echo "::error::Stable version on a pre-release-* branch; cut stable via a release-* PR"
            exit 1
          fi
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$IS_DEV" = "true" ]; then
            echo "::error::Dev version in a release-* PR; cut pre-releases from a pre-release-* branch"
            exit 1
          fi

      - name: Build
        run: just build

      - name: Create GitHub release
        env:
          TAG_NAME: "v${{ steps.version.outputs.VERSION }}"
          IS_DEV: ${{ steps.version.outputs.IS_DEV }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
        run: |
          PRERELEASE_FLAG=""
          NOTES_START=""
          if [ "$IS_DEV" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          else
            # Anchor stable notes to the previous stable tag so dev
            # pre-releases between releases do not truncate the changelog.
            PREV_STABLE=$(git tag --list 'v*' --sort=-version:refname \
              | grep -v -- '-dev' | head -n1)
            if [ -n "$PREV_STABLE" ]; then
              NOTES_START="--notes-start-tag $PREV_STABLE"
            fi
          fi
          gh release create "$TAG_NAME" \
            $PRERELEASE_FLAG \
            $NOTES_START \
            --generate-notes \
            --target "$TARGET_SHA" \
            dist/*

      - name: Publish to PyPI
        run: uv publish dist/*.whl dist/*.tar.gz

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm
        env:
          IS_DEV: ${{ steps.version.outputs.IS_DEV }}
        run: |
          TAG="latest"
          if [ "$IS_DEV" = "true" ]; then
            TAG="next"
          fi
          for tgz in ./dist/*.tgz; do
            [ -e "$tgz" ] || continue
            npm publish "$tgz" --provenance --access public --tag "$TAG"
          done
