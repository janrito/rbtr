name: Release

on:
  push:
    branches:
      - "release-*"
      - "pre-release-*"

permissions:
  contents: write
  id-token: write

jobs:
  checks:
    uses: ./.github/workflows/checks.yaml

  release:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: extractions/setup-just@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --frozen

      - uses: oven-sh/setup-bun@v2

      - name: Install node deps
        run: bun install --frozen-lockfile

      - name: Validate branch name
        id: version
        run: |
          VERSION=$(just --evaluate current_version)
          IS_DEV=$(just --evaluate is_dev)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_DEV=$IS_DEV" >> $GITHUB_OUTPUT

          BRANCH="${GITHUB_REF_NAME}"
          if [ "$IS_DEV" = "true" ] && ! echo "$BRANCH" | grep -q "^pre-release-"; then
            echo "::error::Dev version $VERSION must be on a pre-release-* branch"
            exit 1
          fi
          if [ "$IS_DEV" = "false" ] && ! echo "$BRANCH" | grep -q "^release-"; then
            echo "::error::Stable version $VERSION must be on a release-* branch"
            exit 1
          fi

      - name: Build
        run: just build

      - name: Create GitHub release
        env:
          TAG_NAME: "v${{ steps.version.outputs.VERSION }}"
          IS_DEV: ${{ steps.version.outputs.IS_DEV }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_DEV" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG_NAME" \
            $PRERELEASE_FLAG \
            --generate-notes \
            --target "$GITHUB_SHA" \
            dist/*

      - name: Publish to PyPI
        run: uv publish dist/*.whl dist/*.tar.gz

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm
        env:
          IS_DEV: ${{ steps.version.outputs.IS_DEV }}
        run: |
          TAG="latest"
          if [ "$IS_DEV" = "true" ]; then
            TAG="next"
          fi
          for tgz in ./dist/*.tgz; do
            [ -e "$tgz" ] || continue
            npm publish "$tgz" --provenance --access public --tag "$TAG"
          done
