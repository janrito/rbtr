name: Release

on:
  push:
    branches:
      - "release-*"
      - "pre-release-*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: extractions/setup-just@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --frozen

      - name: Validate branch name
        id: version
        run: |
          VERSION=$(just --evaluate current_version)
          IS_DEV=$(just --evaluate is_dev)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_DEV=$IS_DEV" >> $GITHUB_OUTPUT

          BRANCH="${GITHUB_REF_NAME}"
          if [ "$IS_DEV" = "true" ] && ! echo "$BRANCH" | grep -q "^pre-release-"; then
            echo "::error::Dev version $VERSION must be on a pre-release-* branch"
            exit 1
          fi
          if [ "$IS_DEV" = "false" ] && ! echo "$BRANCH" | grep -q "^release-"; then
            echo "::error::Stable version $VERSION must be on a release-* branch"
            exit 1
          fi

      - name: Run checks
        run: just check

      - name: Build
        run: just build

      - name: Create GitHub release
        env:
          TAG_NAME: "v${{ steps.version.outputs.VERSION }}"
          IS_DEV: ${{ steps.version.outputs.IS_DEV }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_DEV" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG_NAME" \
            $PRERELEASE_FLAG \
            --generate-notes \
            --target "$GITHUB_SHA" \
            dist/*

      - name: Publish to PyPI
        run: uv publish
