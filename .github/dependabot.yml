version: 2
updates:
  # Python (uv workspace: root pyproject + packages/*, single uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # JS/TS (bun workspace: root package.json + packages/pi-rbtr)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      js-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the CI / release workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
