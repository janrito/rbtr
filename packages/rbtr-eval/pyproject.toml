[build-system]
requires = ["uv_build>=0.9,<1"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "rbtr_eval"
source-exclude = ["**/tests"]

[project]
name = "rbtr-eval"
version = "2026.6.0-dev1"
description = "rbtr — search-quality evaluation harness"
license = "MIT"
requires-python = ">=3.13"
dependencies = [
  "rbtr",
  "pydantic>=2.12",
  "pydantic-settings[toml]>=2.12",
  "dvc",
  "minijinja>=2.0",
  "polars>=1.0",
  "dataframely>=2.9.1",
  "optuna>=4.0",
  "pydantic-ai>=1.70.0",
  "vl-convert-python>=1.0",
  "tomli-w>=1.2.0",
]

[project.scripts]
rbtr-eval = "rbtr_eval.cli:main"

[tool.uv.sources]
rbtr = { workspace = true }

[dependency-groups]
dev = [
  "pytest",
  "pytest-cases>=3.10.1",
  "pytest-xdist>=3.8.0",
]
