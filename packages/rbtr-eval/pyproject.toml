[build-system]
requires = ["uv_build>=0.9,<1"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "rbtr_eval"

[project]
name = "rbtr-eval"
version = "2026.4.0"
description = "rbtr — search-quality evaluation harness"
license = "MIT"
requires-python = ">=3.13"
dependencies = [
  "rbtr",
  "pydantic>=2.12",
  "pydantic-settings[toml]>=2.12",
  "dvc",
  "minijinja>=2.0",
  "polars>=1.0",
  "dataframely>=2.9.1",
]

[project.scripts]
rbtr-eval = "rbtr_eval.cli:main"

[tool.uv.sources]
rbtr = { workspace = true }

[dependency-groups]
dev = [
  "pytest",
  "pytest-cases>=3.10.1",
  "pytest-xdist>=3.8.0",
]
