[build-system]
requires = ["uv_build>=0.9,<1"]
build-backend = "uv_build"

[tool.uv.build-backend]
source-exclude = ["**/tests"]

[project]
name = "rbtr"
version = "2026.6.1"
description = "rbtr — structural code index"
license = "MIT"
requires-python = ">=3.13"
dependencies = [
  "duckdb>=1.0",
  "dataframely>=2.9.1",
  "huggingface-hub",
  "llama-cpp-python>=0.3.24",
  "pathspec>=1.0.4",
  "platformdirs>=4.0",
  "pluggy>=1.6",
  "pyarrow>=17.0",
  "pydantic>=2.12",
  "pydantic-settings[toml]>=2.12",
  "pygit2",
  "pyzmq>=27.1.0",
  "rich>=13.0",
  "rich-argparse>=1.7.2",
  "structlog>=24.1",

  # Default language plugins (required — ship with core).
  "rbtr-lang-bash",

  # tree-sitter — one grammar per built-in (not-yet-packaged) language
  "tree-sitter>=0.24",
  "tree-sitter-c",
  "tree-sitter-cpp",
  "tree-sitter-css",
  "tree-sitter-go",
  "tree-sitter-hcl",
  "tree-sitter-html",
  "tree-sitter-java",
  "tree-sitter-javascript",
  "tree-sitter-json",
  "tree-sitter-language-pack",  # Vue grammar (bundled, hermetic)
  "tree-sitter-less",
  "tree-sitter-markdown",
  "tree-sitter-python",
  "tree-sitter-query",
  "tree-sitter-rst",
  "tree-sitter-ruby",
  "tree-sitter-rust",
  "tree-sitter-scss",
  "tree-sitter-svelte",
  "tree-sitter-toml",
  "tree-sitter-typescript",
  "tree-sitter-yaml",
]

[project.scripts]
rbtr = "rbtr.cli:main"

# Ships the `snapshot_json` fixture (from the shared test harness) to every
# plugin test suite with no per-package conftest boilerplate.
[project.entry-points.pytest11]
rbtr = "rbtr.languages.testing"

# Optional language plugins are wired here as extras during the
# language-plugin-packaging migration.
[project.optional-dependencies]
sql = ["rbtr-lang-sql"]
# Test-support extra for `rbtr.languages.testing`: what a plugin package
# needs to run its extraction/snapshot tests against the shared harness.
# The pytest bound lives here (not just in `dev`) so that a plugin whose
# only test dep is `rbtr[test]` still gets it.
test = [
  # Held below 9.1: pytest-cases 3.10.1 breaks on pytest 9.1's changed
  # IdMaker signature. Drop the bound once pytest-cases is compatible.
  "pytest<9.1",
  "pytest-cases>=3.10.1",
  "syrupy>=5.3.4",
]

# Language-plugin packages resolve to their workspace members.
[tool.uv.sources]
rbtr-lang-bash = { workspace = true }
rbtr-lang-sql = { workspace = true }

[dependency-groups]
dev = [
  "pyinstrument>=5.0",
  "pytest-mock",
  "pytest-xdist>=3.8.0",
  "rbtr[test]",
]
