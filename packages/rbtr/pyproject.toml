[build-system]
requires = ["uv_build>=0.9,<1"]
build-backend = "uv_build"

[tool.uv.build-backend]
source-exclude = ["**/tests"]

[project]
name = "rbtr"
version = "2026.6.1"
description = "rbtr — structural code index"
license = "MIT"
requires-python = ">=3.13"
dependencies = [
  "duckdb>=1.0",
  "dataframely>=2.9.1",
  "huggingface-hub",
  "llama-cpp-python>=0.3.24",
  "pathspec>=1.0.4",
  "platformdirs>=4.0",
  "pyarrow>=17.0",
  "pydantic>=2.12",
  "pydantic-settings[toml]>=2.12",
  "pygit2",
  "pyzmq>=27.1.0",
  "rich>=13.0",
  "rich-argparse>=1.7.2",
  "structlog>=24.1",

  # Default language plugins (required — ship with core).
  "rbtr-lang-bash",
  "rbtr-lang-c",
  "rbtr-lang-cpp",
  "rbtr-lang-html",
  "rbtr-lang-javascript",
  "rbtr-lang-python",

  # tree-sitter — one grammar per built-in (not-yet-packaged) language
  "tree-sitter>=0.24",
  "tree-sitter-go",
  "tree-sitter-hcl",
  "tree-sitter-java",
  "tree-sitter-json",
  "tree-sitter-language-pack",  # Vue grammar (bundled, hermetic)
  "tree-sitter-markdown",
  "tree-sitter-query",
  "tree-sitter-rst",
  "tree-sitter-ruby",
  "tree-sitter-rust",
  "tree-sitter-svelte",
  "tree-sitter-toml",
  "tree-sitter-yaml",
]

[project.scripts]
rbtr = "rbtr.cli:main"

# Ships the `snapshot_json` fixture (from the shared test harness) to every
# plugin test suite with no per-package conftest boilerplate.
[project.entry-points.pytest11]
rbtr = "rbtr.testing"

# Languages bundled in core, discovered via the `rbtr.languages` entry-point
# group (same mechanism external `rbtr-lang-*` packages use). Each value is a
# `LanguageRegistration`, named by its language id. As languages are extracted
# into their own packages, their entry point moves to that package's pyproject.
[project.entry-points."rbtr.languages"]
go = "rbtr.languages.go.plugin:go"
hcl = "rbtr.languages.hcl.plugin:hcl"
java = "rbtr.languages.java.plugin:java"
json = "rbtr.languages.json.plugin:json"
markdown = "rbtr.languages.markdown.plugin:markdown"
query = "rbtr.languages.query.plugin:query"
rst = "rbtr.languages.rst.plugin:rst"
ruby = "rbtr.languages.ruby.plugin:ruby"
rust = "rbtr.languages.rust.plugin:rust"
svelte = "rbtr.languages.sfc.plugin:svelte"
vue = "rbtr.languages.sfc.plugin:vue"
toml = "rbtr.languages.toml.plugin:toml"
yaml = "rbtr.languages.yaml.plugin:yaml"

# Optional language plugins are wired here as extras during the
# language-plugin-packaging migration.
[project.optional-dependencies]
css = ["rbtr-lang-css"]
less = ["rbtr-lang-less"]
scss = ["rbtr-lang-scss"]
sql = ["rbtr-lang-sql"]
# Test-support extra for `rbtr.testing`: what a plugin package
# needs to run its extraction/snapshot tests against the shared harness.
# The pytest bound lives here (not just in `dev`) so that a plugin whose
# only test dep is `rbtr[test]` still gets it.
test = [
  # Held below 9.1: pytest-cases 3.10.1 breaks on pytest 9.1's changed
  # IdMaker signature. Drop the bound once pytest-cases is compatible.
  "pytest<9.1",
  "pytest-cases>=3.10.1",
  "syrupy>=5.3.4",
]

# Language-plugin packages resolve to their workspace members.
[tool.uv.sources]
rbtr-lang-bash = { workspace = true }
rbtr-lang-c = { workspace = true }
rbtr-lang-cpp = { workspace = true }
rbtr-lang-css = { workspace = true }
rbtr-lang-html = { workspace = true }
rbtr-lang-javascript = { workspace = true }
rbtr-lang-less = { workspace = true }
rbtr-lang-python = { workspace = true }
rbtr-lang-scss = { workspace = true }
rbtr-lang-sql = { workspace = true }

[dependency-groups]
dev = [
  "pyinstrument>=5.0",
  "pytest-mock",
  "pytest-xdist>=3.8.0",
  "rbtr[test]",
]
