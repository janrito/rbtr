[build-system]
requires = ["uv_build>=0.11.26,<1"]
build-backend = "uv_build"

[tool.uv.build-backend]
source-exclude = ["**/tests"]

[project]
name = "rbtr"
version = "2026.6.1"
description = "rbtr — structural code index"
license = "MIT"
requires-python = ">=3.13"
dependencies = [
  "duckdb>=1.0",
  "dataframely>=2.9.1",
  "huggingface-hub",
  "llama-cpp-python>=0.3.24",
  "pathspec>=1.0.4",
  "platformdirs>=4.0",
  "pluggy>=1.6",
  "pyarrow>=17.0",
  "pydantic>=2.12",
  "pydantic-settings[toml]>=2.12",
  "pygit2",
  "pyzmq>=27.1.0",
  "rich>=13.0",
  "rich-argparse>=1.7.2",
  "structlog>=24.1",

  # tree-sitter — one grammar per built-in language plugin
  "tree-sitter>=0.24",
  "tree-sitter-bash",
  "tree-sitter-c",
  "tree-sitter-cpp",
  "tree-sitter-css",
  "tree-sitter-go",
  "tree-sitter-hcl",
  "tree-sitter-html",
  "tree-sitter-java",
  "tree-sitter-javascript",
  "tree-sitter-json",
  "tree-sitter-markdown",
  "tree-sitter-python",
  "tree-sitter-rst",
  "tree-sitter-ruby",
  "tree-sitter-rust",
  "tree-sitter-sql",
  "tree-sitter-toml",
  "tree-sitter-typescript",
  "tree-sitter-yaml",
]

[project.scripts]
rbtr = "rbtr.cli:main"

[dependency-groups]
dev = [
  "pyinstrument>=5.0",
  # Held below 9.1: pytest-cases 3.10.1 breaks on pytest 9.1's changed
  # IdMaker signature. Drop the bound once pytest-cases is compatible.
  "pytest<9.1",
  "pytest-cases>=3.10.1",
  "pytest-mock",
  "pytest-xdist>=3.8.0",
]
