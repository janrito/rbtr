[build-system]
requires = ["uv_build>=0.9,<1"]
build-backend = "uv_build"

[tool.uv.build-backend]
source-exclude = ["**/tests"]

[project]
name = "rbtr"
version = "2026.6.0-dev5"
description = "rbtr — structural code index"
license = "MIT"
requires-python = ">=3.13"
dependencies = [
  "duckdb>=1.0",
  "dataframely>=2.9.1",
  "huggingface-hub",
  # HACK: 0.3.23 needs kv_unified=True for embedding contexts
  # (PR #2217, merged but unreleased). Without it, batch embedding
  # of sequences >256 tokens crashes. We apply the fix in
  # _llama_cpp_compat.py. Remove the compat module and unpin when
  # a release includes #2217.
  # https://github.com/abetlen/llama-cpp-python/pull/2217
  "llama-cpp-python==0.3.23",
  "pathspec>=1.0.4",
  "platformdirs>=4.0",
  "pluggy>=1.6",
  "pyarrow>=17.0",
  "pydantic>=2.12",
  "pydantic-settings[toml]>=2.12",
  "pygit2",
  "pyzmq>=27.1.0",
  "rich>=13.0",
  "rich-argparse>=1.7.2",

  # tree-sitter — one grammar per built-in language plugin
  "tree-sitter>=0.24",
  "tree-sitter-bash",
  "tree-sitter-c",
  "tree-sitter-cpp",
  "tree-sitter-css",
  "tree-sitter-go",
  "tree-sitter-hcl",
  "tree-sitter-html",
  "tree-sitter-java",
  "tree-sitter-javascript",
  "tree-sitter-json",
  "tree-sitter-markdown",
  "tree-sitter-python",
  "tree-sitter-rst",
  "tree-sitter-ruby",
  "tree-sitter-rust",
  "tree-sitter-toml",
  "tree-sitter-typescript",
  "tree-sitter-yaml",
]

[project.scripts]
rbtr = "rbtr.cli:main"

[dependency-groups]
dev = [
  "pyinstrument>=5.0",
  "pytest",
  "pytest-cases>=3.10.1",
  "pytest-mock",
  "pytest-xdist>=3.8.0",
]
