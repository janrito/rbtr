[build-system]
requires = ["uv_build>=0.9,<1"]
build-backend = "uv_build"

[tool.uv.build-backend]
source-exclude = ["**/tests"]

[project]
name = "rbtr"
version = "2026.6.1"
description = "rbtr — structural code index"
license = "MIT"
requires-python = ">=3.13"
dependencies = [
  "duckdb>=1.0",
  "dataframely>=2.9.1",
  "huggingface-hub",
  "llama-cpp-python>=0.3.34",
  "pathspec>=1.0.4",
  "platformdirs>=4.0",
  "pyarrow>=17.0",
  "pydantic>=2.12",
  "pydantic-settings[toml]>=2.12",
  "pygit2",
  "pyzmq>=27.1.0",
  "rich>=13.0",
  "rich-argparse>=1.7.2",
  "structlog>=24.1",

  # Default language plugins (required — ship with core).
  "rbtr-lang-bash",
  "rbtr-lang-c",
  "rbtr-lang-cpp",
  "rbtr-lang-html",
  "rbtr-lang-javascript",
  "rbtr-lang-markdown",
  "rbtr-lang-python",
  "rbtr-lang-rst",

  # tree-sitter — one grammar per built-in (not-yet-packaged) language
  "tree-sitter>=0.24",
]

[project.scripts]
rbtr = "rbtr.cli:main"

# Ships the `snapshot_json` fixture (from the shared test harness) to every
# plugin test suite with no per-package conftest boilerplate.
[project.entry-points.pytest11]
rbtr = "rbtr.testing"

# Optional language plugins are wired here as extras during the
# language-plugin-packaging migration.
[project.optional-dependencies]
css = ["rbtr-lang-css"]
go = ["rbtr-lang-go"]
hcl = ["rbtr-lang-hcl"]
java = ["rbtr-lang-java"]
json = ["rbtr-lang-json"]
less = ["rbtr-lang-less"]
ruby = ["rbtr-lang-ruby"]
rust = ["rbtr-lang-rust"]
scss = ["rbtr-lang-scss"]
sql = ["rbtr-lang-sql"]
svelte = ["rbtr-lang-svelte"]
toml = ["rbtr-lang-toml"]
tree_sitter_query = ["rbtr-lang-tree-sitter-query"]
vue = ["rbtr-lang-vue"]
yaml = ["rbtr-lang-yaml"]
# Convenience aggregate: `all` pulls every optional plugin (the defaults are
# already required deps, so `rbtr[all]` installs every language). No `web`
# grouping — html and javascript are defaults, so it would only add css.
all = [
  "rbtr-lang-css",
  "rbtr-lang-scss",
  "rbtr-lang-less",
  "rbtr-lang-json",
  "rbtr-lang-toml",
  "rbtr-lang-yaml",
  "rbtr-lang-hcl",
  "rbtr-lang-go",
  "rbtr-lang-java",
  "rbtr-lang-ruby",
  "rbtr-lang-rust",
  "rbtr-lang-sql",
  "rbtr-lang-tree-sitter-query",
  "rbtr-lang-svelte",
  "rbtr-lang-vue",
]
# Test-support extra for `rbtr.testing`: what a plugin package
# needs to run its extraction/snapshot tests against the shared harness.
# The pytest bound lives here (not just in `dev`) so that a plugin whose
# only test dep is `rbtr[test]` still gets it.
test = [
  # Held below 9.1: pytest-cases 3.10.1 breaks on pytest 9.1's changed
  # IdMaker signature. Drop the bound once pytest-cases is compatible.
  "pytest<9.1",
  "pytest-cases>=3.10.1",
  "syrupy>=5.3.4",
]

# Language-plugin packages resolve to their workspace members.
[tool.uv.sources]
rbtr-lang-bash = { workspace = true }
rbtr-lang-c = { workspace = true }
rbtr-lang-cpp = { workspace = true }
rbtr-lang-css = { workspace = true }
rbtr-lang-go = { workspace = true }
rbtr-lang-hcl = { workspace = true }
rbtr-lang-html = { workspace = true }
rbtr-lang-java = { workspace = true }
rbtr-lang-javascript = { workspace = true }
rbtr-lang-json = { workspace = true }
rbtr-lang-less = { workspace = true }
rbtr-lang-markdown = { workspace = true }
rbtr-lang-python = { workspace = true }
rbtr-lang-rst = { workspace = true }
rbtr-lang-ruby = { workspace = true }
rbtr-lang-rust = { workspace = true }
rbtr-lang-scss = { workspace = true }
rbtr-lang-sql = { workspace = true }
rbtr-lang-svelte = { workspace = true }
rbtr-lang-toml = { workspace = true }
rbtr-lang-tree-sitter-query = { workspace = true }
rbtr-lang-vue = { workspace = true }
rbtr-lang-yaml = { workspace = true }

[dependency-groups]
dev = [
  "pyinstrument>=5.0",
  "pytest-mock",
  "pytest-xdist>=3.8.0",
  "rbtr[test]",
]
